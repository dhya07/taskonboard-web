<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TaskOnBoard – Password Reset</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .container {
      background: white;
      color: #333;
      border-radius: 16px;
      padding: 32px 24px;
      max-width: 400px;
      margin: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      margin: 0 0 16px 0;
      font-size: 24px;
      color: #1a1a1a;
    }
    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    p {
      margin: 12px 0;
      line-height: 1.6;
      color: #666;
    }
    .app-link {
      display: inline-block;
      background: #667eea;
      color: white;
      text-decoration: none;
      padding: 12px 32px;
      border-radius: 8px;
      font-weight: 600;
      margin: 20px 0;
      transition: background 0.2s;
    }
    .app-link:hover {
      background: #5568d3;
    }
    .app-link:active {
      background: #4a5bc4;
    }
    .download-link {
      font-size: 14px;
      color: #667eea;
      text-decoration: none;
      font-weight: 500;
    }
    .error-text {
      color: #dc3545;
      font-weight: 500;
    }
    #status {
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔐 Reset Your Password</h1>
    <div id="loading">
      <div class="spinner"></div>
      <p>Opening TaskOnBoard app...</p>
    </div>
    <div id="status"></div>
    <a id="manual-link" class="app-link" href="#" style="display: none;">
      Tap here if app doesn't open
    </a>
    <p style="margin-top: 24px;">
      <a class="download-link" href="https://taskonboard.com" target="_blank">
        Don't have the app? Download here
      </a>
    </p>
  </div>

  <script>
    (function () {
      // Parse URL parameters
      const params = new URLSearchParams(window.location.search);
      const oobCode = params.get('oobCode');
      const mode = params.get('mode') || 'resetPassword';
      const env = params.get('env') || params.get('app') || 'prod';
      
      // Determine deep link scheme based on environment
      const scheme = (env === 'dev' || env === 'development') ? 'taskonboard-dev' : 'taskonboard';
      
      // Build deep link
      const deepLink = oobCode
        ? `${scheme}://Auth/reset-password?oobCode=${encodeURIComponent(oobCode)}&mode=${encodeURIComponent(mode)}`
        : null;
      
      if (!oobCode) {
        document.getElementById('loading').innerHTML = '<p class="error-text">❌ Invalid or expired reset link</p>';
        document.getElementById('status').innerHTML = '<p>Please request a new password reset email.</p>';
        return;
      }

      // Set manual link
      const manualLink = document.getElementById('manual-link');
      manualLink.href = deepLink;

      // Attempt to open app immediately with multiple strategies
      let attemptCount = 0;
      const maxAttempts = 3;

      function tryOpenApp() {
        attemptCount++;
        
        try {
          // Strategy 1: Direct navigation
          window.location.href = deepLink;
          
          // Strategy 2: Replace location (more aggressive)
          setTimeout(() => {
            if (attemptCount === 1) {
              window.location.replace(deepLink);
            }
          }, 100);
          
          // Strategy 3: window.open as fallback
          setTimeout(() => {
            if (attemptCount === 1) {
              window.open(deepLink, '_self');
            }
          }, 200);
        } catch (e) {
          console.error('Error opening app:', e);
        }

        // After attempts, show manual button
        setTimeout(() => {
          if (attemptCount >= maxAttempts) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('status').innerHTML = '<p>Tap the button below to open the app</p>';
            manualLink.style.display = 'inline-block';
          }
        }, 500 * attemptCount);
      }

      // Start opening attempts
      tryOpenApp();
      
      // Additional attempts with delays
      setTimeout(tryOpenApp, 500);
      setTimeout(tryOpenApp, 1000);
    })();
  </script>
</body>
</html>
