<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TaskOnBoard – password reset</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; background: #f6f7f9; color: #111; margin: 0; padding: 24px; line-height: 1.45; text-align: center; }
    p { max-width: 420px; margin: 16px auto; }
    a { color: #0d6efd; font-weight: 600; word-break: break-all; }
  </style>
</head>
<body>
  <p>Open the TaskOnBoard app to set your new password.</p>
  <p><a id="open" href="#">Open TaskOnBoard</a></p>
  <p style="font-size: 14px; color: #555;">If nothing happens, install the app from the store, then return here and tap the link again.</p>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var oob = params.get('oobCode');
      var mode = params.get('mode') || 'resetPassword';
      var app = (params.get('app') || 'prod').toLowerCase();
      var scheme = app === 'dev' ? 'taskonboard-dev' : 'taskonboard';
      var a = document.getElementById('open');
      if (!oob) {
        a.textContent = 'Invalid or expired reset link';
        a.removeAttribute('href');
        return;
      }
      var deep = scheme + '://Auth/reset-password?oobCode=' + encodeURIComponent(oob) + '&mode=' + encodeURIComponent(mode);
      a.href = deep;
      window.location.replace(deep);
    })();
  </script>
</body>
</html>
